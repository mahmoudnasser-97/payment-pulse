services:

  # ===========================================================================
  # DATABASES
  # ===========================================================================

  postgres-meta:
    image: postgres:15
    container_name: postgres-meta
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    ports:
      - "5433:5432"
    volumes:
      - postgres_meta_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster -d dagster"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - data-platform

  postgres-dw:
    image: postgres:15
    container_name: postgres-dw
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse_dw"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - data-platform

  # ===========================================================================
  # MINIO (our data lake — stores Bronze, Silver, Gold layers)
  # ===========================================================================

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "0.0.0.0:9000:9000"
      - "0.0.0.0:9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "ls", "-la", "/data"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - data-platform

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/bronze --ignore-existing;
        mc mb local/silver --ignore-existing;
        mc mb local/gold   --ignore-existing;
        echo 'Buckets ready.';
      "
    restart: "no"
    networks:
      - data-platform

  # ===========================================================================
  # REDIS (real-time feature store for fraud scoring)
  # ===========================================================================

  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - data-platform

  # ===========================================================================
  # KAFKA STACK (real-time event streaming)
  # ===========================================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q 'Mode:'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - data-platform

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "0.0.0.0:9092:9092"
      - "0.0.0.0:29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - data-platform

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: pulse-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    restart: unless-stopped
    networks:
      - data-platform

  kafka-connect:
    build:
      context: ./kafka-connect
    container_name: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: pulse-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - data-platform

  # ===========================================================================
  # SPARK CLUSTER (stream processing + ML fraud scoring)
  # ===========================================================================

  spark-master:
    build:
      context: ./spark
    container_name: spark-master
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./spark_jobs:/opt/spark_jobs
      - ./data:/opt/data
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - data-platform

  spark-worker:
    build:
      context: ./spark
    container_name: spark-worker
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
    volumes:
      - ./spark_jobs:/opt/spark_jobs
      - ./data:/opt/data
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://spark-master:8080/json/ | grep -q '\"aliveworkers\":0' && exit 1 || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - data-platform

  spark-streaming:
    build:
      context: ./spark
    container_name: spark-streaming
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./spark_jobs:/opt/spark_jobs
    command: >
      bash -c "sleep 20 &&
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --jars /opt/spark_jobs/jars/spark-sql-kafka-0-10_2.12-3.5.1.jar,/opt/spark_jobs/jars/kafka-clients-3.4.0.jar,/opt/spark_jobs/jars/spark-token-provider-kafka-0-10_2.12-3.5.1.jar,/opt/spark_jobs/jars/commons-pool2-2.11.1.jar
      /opt/spark_jobs/streaming_job.py"
    restart: on-failure
    networks:
      - data-platform

  # ===========================================================================
  # DAGSTER (pipeline orchestration)
  # ===========================================================================

  dagster-user-code:
    build:
      context: ./dagster
      dockerfile: Dockerfile_user_code
    container_name: dagster-user-code
    image: pulse-user-code
    environment:
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_POSTGRES_HOST: postgres-meta
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_CURRENT_IMAGE: pulse-user-code
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./dagster/pipelines:/opt/dagster/app
      - ./spark_jobs:/opt/spark_jobs
      - ./data:/opt/data
    depends_on:
      postgres-meta:
        condition: service_healthy
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "dagster", "api", "grpc-health-check", "-p", "4000"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 20
    restart: unless-stopped
    networks:
      - data-platform

  dagster-webserver:
    build:
      context: ./dagster
      dockerfile: Dockerfile_dagster
    container_name: dagster-webserver
    entrypoint: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "workspace.yaml"]
    ports:
      - "3000:3000"
    environment:
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_POSTGRES_HOST: postgres-meta
      DAGSTER_POSTGRES_DB: dagster
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres-meta:
        condition: service_healthy
      dagster-user-code:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - data-platform

  dagster-daemon:
    build:
      context: ./dagster
      dockerfile: Dockerfile_dagster
    container_name: dagster-daemon
    entrypoint: ["dagster-daemon", "run"]
    environment:
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_POSTGRES_HOST: postgres-meta
      DAGSTER_POSTGRES_DB: dagster
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres-meta:
        condition: service_healthy
      dagster-user-code:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - data-platform

  # ===========================================================================
  # JUPYTER (for ML model training notebook)
  # ===========================================================================

  jupyter:
    build:
      context: ./jupyter
    container_name: jupyter
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: pulse
      SPARK_MASTER: spark://spark-master:7077
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
      - ./spark_jobs:/home/jovyan/spark_jobs
    restart: unless-stopped
    networks:
      - data-platform

  # ===========================================================================
  # STREAMLIT (live dashboard)
  # ===========================================================================

  streamlit:
    build:
      context: ./streamlit
    container_name: streamlit
    depends_on:
      redis:
        condition: service_healthy
      postgres-dw:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PG_HOST: postgres-dw
      PG_PORT: "5432"
      PG_USER: pulse
      PG_PASSWORD: pulse
      PG_DB: pulse_dw
    restart: unless-stopped
    networks:
      - data-platform

networks:
  data-platform:
    driver: bridge

volumes:
  postgres_meta_data:
  postgres_dw_data:
  minio_data:
  redis_data: